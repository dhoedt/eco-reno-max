<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EcoReno - John Doe, entrepreneur en éco-construction">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Urbanist:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/projects.css">
  <title>EcoRéno Max</title>
</head>

<body>

  <header>
    <div class="wrapper">
      <nav>
        <a href="index.html">EcoRéno Max</a>
      </nav>
      <address>
        <a href="mailto:ecoreno.max@gmail.com">
          <i class="fa-solid fa-envelope" aria-hidden="true"></i>
        </a>
        <a href="tel:+32493044788">
          <i class="fa-solid fa-phone" aria-hidden="true"></i>
          +32 493 04 47 88
        </a>
      </address>
    </div>
  </header>

  <main>
    <section id="projects">
      <div class="wrapper">
        <h2>Réalisations</h2>
        <article class="project">
          <div class="comparison">
            <picture class="comparison-before">
              <source type="image/jpeg"
                srcset="./img/400/before.jpg 400w, ./img/800/before.jpg 800w, ./img/1200/before.jpg 1200w"
                sizes="(max-width: 600px) 400px, (max-width: 900px) 800px, 1200px">
                <img src="./img/src/before.png" alt="Avant rénovation énergétique">
            </picture>
              <source type="image/webp"
                srcset="./img/400/before.webp 400w, ./img/800/before.webp 800w, ./img/1200/before.webp 1200w"
                sizes="(max-width: 600px) 400px, (max-width: 900px) 800px, 1200px">
            </picture>
            <picture class="comparison-after">
              <source type="image/jpeg"
                srcset="./img/400/after.jpg 400w, ./img/800/after.jpg 800w, ./img/1200/after.jpg 1200w"
                sizes="(max-width: 600px) 400px, (max-width: 900px) 800px, 1200px">
                <img src="./img/src/after.png" alt="Après rénovation énergétique">
            </picture>
              <source type="image/webp"
                srcset="./img/400/after.webp 400w, ./img/800/after.webp 800w, ./img/1200/after.webp 1200w"
                sizes="(max-width: 600px) 400px, (max-width: 900px) 800px, 1200px">
            </picture>
            <div class="comparison-handle">
              <div class="comparison-handle-btn">&#8592; &#8594;</div>
            </div>
            <span class="comparison-label comparison-label--before">Avant</span>
            <span class="comparison-label comparison-label--after">Après</span>
            <input class="comparison-range" type="range" min="0" max="100" value="50"
              aria-label="Comparer avant et après">
          </div>
          <div class="project-body">
            <h3>Rénovation de sol</h3>
            <p>Suppression d'une couche d'un mortier d'égalisation qui couvrait un vieux carrelage d'époque.</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <p><span>Made with lots of ♥ by</span> <a href="https://www.linkedin.com/in/martin-dhoedt/">Martin D'Hoedt</a></p>
  </footer>

  <script>
    document.querySelectorAll('.comparison').forEach(comp => {
      const range = comp.querySelector('.comparison-range');
      range.addEventListener('input', () => {
        comp.style.setProperty('--split', range.value + '%');
      });
    });
  </script>
</body>

</html>
