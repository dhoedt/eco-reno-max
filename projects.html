<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EcoReno - John Doe, entrepreneur en éco-construction">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Urbanist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/projects.css">
  <title>EcoReno</title>
</head>
<body>

  <header>
    <div class="wrapper">
      <nav>
        <a href="index.html">EcoReno</a>
      </nav>
      <address>
        <a href="tel:+33612345678">
          <i class="fa-solid fa-phone" aria-hidden="true"></i>
          +33 6 12 34 56 78
        </a>
      </address>
    </div>
  </header>

  <main>
    <section id="projects">
      <div class="wrapper">
        <h2>Réalisations</h2>
        <article class="project">
          <div class="comparison">
            <img class="comparison-before"
              src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&h=600&fit=crop"
              alt="Avant rénovation énergétique">
            <img class="comparison-after"
              src="https://images.unsplash.com/photo-1556909172-54557c7e4fb7?w=800&h=600&fit=crop"
              alt="Après rénovation énergétique">
            <div class="comparison-handle">
              <div class="comparison-handle-btn">&#8592; &#8594;</div>
            </div>
            <span class="comparison-label comparison-label--before">Avant</span>
            <span class="comparison-label comparison-label--after">Après</span>
            <input class="comparison-range" type="range" min="0" max="100" value="50"
              aria-label="Comparer avant et après">
          </div>
          <div class="project-body">
            <h3>Rénovation énergétique</h3>
            <p>Isolation des combles et des murs par l'extérieur avec des matériaux biosourcés. Remplacement des menuiseries et installation d'une VMC double flux.</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrapper">
      <p><span>Made with lots of ♥ by</span> <a href="https://www.linkedin.com/in/martin-dhoedt/">Martin D'Hoedt</a></p>
    </div>
  </footer>

  <script>
    document.querySelectorAll('.comparison').forEach(comp => {
      const range = comp.querySelector('.comparison-range');
      range.addEventListener('input', () => {
        comp.style.setProperty('--split', range.value + '%');
      });
    });
  </script>
</body>
</html>
